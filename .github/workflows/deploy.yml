name: Deploy to Tencent Cloud COS

on:
  push:
    branches:
      - main # 或者你的主分支名称

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以防脚本需要

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 建议使用最新的 LTS 或你开发使用的版本
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Sync blog articles
        run: pnpm run sync-blog

      - name: Build project
        run: pnpm run generate

      - name: Deploy to Tencent Cloud COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          pip install coscmd
          coscmd config -a $COS_SECRET_ID -s $COS_SECRET_KEY -b $COS_BUCKET -r $COS_REGION
          coscmd upload -f -r -s --delete .output/public/ /
